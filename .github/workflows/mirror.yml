name: Mirror adminForge matrix-deltachat-bridge

on:
  schedule:
    - cron: '0 */6 * * *'   # alle 6 Stunden
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    # Schreibrechte explizit vergeben
    permissions:
      contents: write

    steps:
      - name: Checkout GitHub Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Mirror-Inhalt kopieren
        run: |
          # Mirror.yml im Speicher sichern
          cp .github/workflows/mirror.yml /tmp/mirror.yml
          
          # AdminForge Repo klonen (Source)
          # Nutze --depth 1 für schnelleren Klon, da wir nur den aktuellen Stand brauchen
          git clone --depth 1 https://oauth2:${{ secrets.TOKEN }}@git.adminforge.de/adminforge/matrix-deltachat-bridge.git /tmp/source
          
          # Alles außer .git/ und .github/ synchronisieren
          # --delete sorgt dafür, dass im Ziel gelöschte Dateien auch hier verschwinden
          rsync -av --delete --exclude='.git/' --exclude='.github/' /tmp/source/ ./
          
          # Mirror.yml wiederherstellen
          mkdir -p .github/workflows/
          cp /tmp/mirror.yml .github/workflows/mirror.yml

      - name: Git konfigurieren & pushen
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Zuerst alle Änderungen (auch neue Dateien) zum Index hinzufügen
          git add -A
          
          # Prüfen, ob es im Index (staged) Unterschiede zum letzten Commit gibt
          if git diff --staged --quiet; then
            echo "Keine Änderungen zum Mergen vorhanden."
          else
            git commit -m "Mirror from adminForge matrix-deltachat-bridge ($(date +'%Y-%m-%d %H:%M'))"
            # Push erzwingen, da wir ein Mirror-Verhalten erzielen wollen
            git push origin main
          fi
