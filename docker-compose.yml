services:
  bridge:
    build: .
    container_name: matrix-deltachat-bridge
    restart: unless-stopped
    volumes:
      - ./data:/data
    env_file:
      - .env
    environment:
      - TZ=Europe/Berlin
      - RUST_LOG=deltachat=warn,pgp=error,deltachat_rpc_server=warn
    user: "1002:998"
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
      - apparmor:docker-default
    cap_drop:
      - ALL
    cpus: 0.5
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "100k"
        max-file: "1"
    healthcheck:
      test: ["CMD-SHELL", "[ -d /proc/1 ] || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
